<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Геракл - 12 подвигов</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <!-- КИБЕРПАНК ШАПКА -->
    <header class="cyber-header">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">ГЕРАКЛ</span>
                <span class="logo-glow"></span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active">Главная</a>
                <a href="reg.html" class="nav-link">Регистрация</a>
                <a href="urovni.html" class="nav-link">Этапы</a>
                <a href="profil.html" class="nav-link">Профиль</a>
                <a href="reiting.html" class="nav-link">Рейтинг</a>
                <a href="podskazka.html" class="nav-link">Подсказка</a>
            </div>
        </div>
        <div class="neon-line"></div>
    </header>

    <!-- КНОПКА "РОЛИК" ПОД ШАПКОЙ СЛЕВА -->
    <div class="video-btn-wrapper">
        <a href="video.mp4" class="video-btn" target="_blank">
            <!-- Здесь будет ваше изображение. Сейчас текст-заглушка -->
            <span class="video-btn-text">▶ РОЛИК</span>
            <!-- Если хотите использовать картинку, раскомментируйте строку ниже и замените путь -->
            <!-- <img src="kartinki/play-button.png" alt="Ролик"> -->
        </a>
    </div>

    <!-- КИБЕРПАНК ПОДВАЛ -->
    <footer class="cyber-footer">
        <div class="footer-content">
            <div class="footer-line"></div>
            <span class="footer-text">⚡ ВЫПОЛНЕНО КОМАНДОЙ 6 ⚡</span>
            <div class="footer-line"></div>
        </div>
        <div class="footer-neon"></div>
    </footer>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="layer-container">
        <img class="bg-full" src="kartinki/fon.jpg" alt="Фоновое изображение">
        
        <!-- Киберпанк декоративные элементы -->
        <div class="cyber-grid"></div>
        
        <!-- ПАРЯЩИЕ ЧАСТИЦЫ -->
        <div class="particles" id="particles"></div>
        
        <!-- МЕРЦАЮЩИЕ ЗВЁЗДЫ -->
        <div class="twinkling-stars" id="twinklingStars"></div>
        
        <!-- ГОЛОГРАФИЧЕСКИЙ КРУГ -->
        <div class="holo-circle"></div>
        
        <!-- БЕГУЩИЕ ОГНИ -->
        <div class="running-lights">
            <div class="running-light top"></div>
            <div class="running-light bottom"></div>
            <div class="running-light left"></div>
            <div class="running-light right"></div>
        </div>
        
        <!-- НЕОНОВЫЕ УГЛЫ -->
        <div class="neon-corner corner-tl"></div>
        <div class="neon-corner corner-tr"></div>
        <div class="neon-corner corner-bl"></div>
        <div class="neon-corner corner-br"></div>

        <div class="layer-1-wrapper">
            <img class="layer-1-img" src="kartinki/fon_1_1.png" alt="Первый слой с отступами">
            <img class="toshka-1" src="kartinki/toshka.png" alt="Тошка 1">
        </div>

        <div class="layer-2-wrapper">
            <img class="layer-2-img" src="kartinki/fon_1_2.png" alt="Второй слой с отступами">
        </div>

        <img class="men-1" src="kartinki/men_1.png" alt="Мужчина 1">
        <img class="men-2" src="kartinki/men_2.png" alt="Мужчина 2">
        
        <img class="toshka-2" src="kartinki/toshka.png" alt="Тошка 2">

        <div class="foreground">
            <div class="text-container">
                <h1 class="info-text">ЦИФРОВОЙ</h1>
                <div class="heracles-wrapper">
                    <h1 class="heracles-shadow">ГЕРАКЛ</h1>
                    <h1 class="heracles-white">ГЕРАКЛ</h1>
                </div>
                <img class="ukrash-img" src="kartinki/ukrash.png" alt="Украшение">
                
                <div class="description-wrapper">
                    <div class="description-text" id="typing-text"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const text = "Сможете ли вы пройти испытания и стать достойными финала?";
        const textElement = document.getElementById('typing-text');
        let index = 0;
        
        function typeWriter() {
            if (index < text.length) {
                textElement.innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, 45);
            }
        }
        
        window.addEventListener('load', () => {
            typeWriter();
        });

        // Генерация парящих частиц
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = 5 + Math.random() * 5 + 's';
                particle.style.width = (Math.random() * 3 + 1) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // Генерация звёзд
        function createStars() {
            const container = document.getElementById('twinklingStars');
            if (!container) return;
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = 2 + Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        createParticles();
        createStars();
    </script>
</body>
</html>
