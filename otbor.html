<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Отборочный Этап — Геракл</title>
    <link rel="stylesheet" href="labirint.css">
</head>
<body>

    <header class="cyber-header">
        <div class="nav-container">
            <div class="logo">ГЕРАКЛ</div>
            <div class="nav-links">
                <a href="main.html" class="nav-link">Главная</a>
                <a href="reg.html" class="nav-link">Регистрация</a>
                <a href="urovni.html" class="nav-link active">Этапы</a>
                <a href="profil.html" class="nav-link">Профиль</a>
            </div>
        </div>
    </header>

    <!-- Окно авторизации/регистрации перед началом -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <h2>АВТОРИЗАЦИЯ КОМАНДЫ</h2>
            <p>Введите данные вашей команды для доступа к 12 подвигам.</p>
            <div class="auth-inputs">
                <input type="text" id="authTeamName" placeholder="Название команды">
                <input type="password" id="authPassword" placeholder="Пароль доступа">
            </div>
            <div class="auth-error" id="authError"></div>
            <button class="auth-submit-btn" id="authSubmitBtn">ПОДТВЕРДИТЬ ДОСТУП</button>
        </div>
    </div>

    <div class="layer-container">
        <img class="bg-full" src="kartinki/fon.jpg" alt="Фон">
        
        <div class="layer-1-wrapper"><img class="layer-1-img" src="kartinki/fon_3_1.png" alt="Слой 1"></div>
        <div class="layer-2-wrapper">
            <img class="layer-2-img" src="kartinki/fon_3_2.png" alt="Слой 2">
            <img class="toshka-1" src="kartinki/toshka.png" alt="Тошка 1">
            <img class="toshka-2" src="kartinki/toshka.png" alt="Тошка 2">
        </div>

        <div class="foreground">
            <div class="labirints-container">
                <div class="header-section">
                    <h1 class="main-title">ОТБОРОЧНЫЙ ТУР</h1>
                    <div class="subtitle">12 ИСПЫТАНИЙ ГЕРАКЛА • КИБЕР-ВЕРСИЯ</div>
                </div>

                <div class="labirints-grid" id="laborsGrid">
                    <!-- Карточки будут генерироваться через JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно подвигов (УВЕЛИЧЕННОЕ) -->
    <div class="modal-overlay" id="laborModal">
        <div class="modal-container modal-large">
            <button class="modal-close-btn" id="closeModalBtn">✕</button>
            <div class="modal-content">
                <div class="modal-badge" id="modalBadge">СТАТУС: АКТИВНО</div>
                <div class="modal-number" id="modalNumber">00</div>
                <h2 class="modal-title" id="modalTitle">Название подвига</h2>
                <div class="modal-story-wrapper">
                    <p class="modal-story" id="modalStory">Текст задания...</p>
                </div>
                
                <div class="gameplay-area">
                    <label class="answer-label">⚡ ВАШ ОТВЕТ ⚡</label>
                    <input type="text" class="answer-input" id="answerInput" placeholder="Введите ваш ответ...">
                    <button class="answer-submit-btn" id="answerSubmitBtn">ОТПРАВИТЬ РЕШЕНИЕ</button>
                    <div class="feedback-msg" id="feedbackMsg"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="cyber-footer">
        <div class="footer-content">
            <span class="footer-text">⚡ ВЫПОЛНЕНО КОМАНДОЙ 6 ⚡</span>
        </div>
    </footer>

    <script>
        // Данные о подвигах
        const laborsData = [
            { id: 1, name: "Немейский лев", hero: "🦁", desc: "Взлом бронированного ядра сервера NEMEAN_LION.EXE.", answer: "1", story: "Система логирования Немейского ухода зафиксировала аномалию. Перед вами 5 серверов с флагами валидации. Ровно три утверждения истинны. Но на сервере, где скрыт Лев, надпись ГАРАНТИРОВАННО ЛЖЕТ. Вычислите ID этого сервера.\n\n1: «Лев скрывается в сервере 3»\n2: «Лев точно не в сервере 4»\n3: «Лев находится в сервере 1 или 5»\n4: «Лев в одном из серверов: 2, 3 или 4»\n5: «Лев точно не в сервере 2»" },
            { id: 2, name: "Лернейская гидра", hero: "🐍", desc: "Остановка рекурсивной Fork-бомбы HYDRA_RECURSION.SH.", answer: "21", story: "Гидра выполняет рекурсивный алгоритм. Функция вычисляется как F(n). Чему будет равно значение переменной после выполнения вызова F(5), если алгоритм устроен следующим образом:\n\nint F(int n) {\n  if (n <= 1) return 1;\n  return F(n-1) + 2 * F(n-2);\n}" },
            { id: 3, name: "Стимфалийские птицы", hero: "🦅", desc: "Дешифровка хэш-сигналов акустического спама.", answer: "27", story: "Дроны-птицы транслируют массив байт. Скрипт обрабатывает их побитовыми операциями. Вычислите итоговое число в десятичной системе счисления после выполнения операции: (Байт_1 XOR Байт_2) | (Байт_3 AND Байт_4).\n\nДанные: Байт_1 = 42, Байт_2 = 60, Байт_3 = 31, Байт_4 = 75" },
            { id: 4, name: "Керинейская лань", hero: "🦌", desc: "Обход бинарного дерева поиска CERYNEIAN_SEARCH.LNK.", answer: "50,70,80,73", story: "Лань движется по бинарному дереву поиска. В корне лежит элемент 50. Лань ищет ключ 73. Выпишите последовательность вершин (через запятую без пробелов), которые посетит алгоритм обхода, если правое поддерево содержит элементы больше корня, а левое — меньше.\n\nСтруктура: Корень(50) -> Лево(30, 40), Право(70 -> Лево(65), Право(80 -> Лево(73)))" },
            { id: 5, name: "Эриманфский вепрь", hero: "🐗", desc: "Переполнение статического буфера и затирание EIP.", answer: "68", story: "Вепрь ломает стек вызовов. Программа выделила статический буфер char buffer[64] под ввод данных функции gets(buffer). Сколько байт данных (включая мусор для заполнения буфера и сам 4-байтовый адрес возврата EIP) нужно отправить, чтобы перезаписать EIP?" },
            { id: 6, name: "Авгиевы конюшни", hero: "🧹", desc: "Мгновенная очистка таблиц гигантской БД СУБД.", answer: "TRUNCATE", story: "Напишите название SQL-команды (одним словом, капсом), которая удаляет ВСЕ строки из таблицы логов, но делает это мгновенно на уровне дисковых страниц, не записывая каждую строчку в журнал транзакций." },
            { id: 7, name: "Критский бык", hero: "🐂", desc: "Парсинг и валидация поврежденной структуры JSON.", answer: "400", story: "Бык прислал поврежденную структуру JSON. Посчитайте суммарное значение всех ключей с именем 'weight', которые находятся строго внутри массива 'nodes'.\n\n{\n  \"status\": \"active\",\n  \"weight\": 500,\n  \"config\": {\n    \"nodes\": [\n      {\"id\": 1, \"weight\": 120},\n      {\"id\": 2, \"weight\": 230},\n      {\"id\": 3, \"type\": \"sub\", \"weight\": 50}\n    ]\n  }\n}" },
            { id: 8, name: "Кони Диомеда", hero: "🐎", desc: "Разрешение взаимной блокировки потоков Deadlock.", answer: "2", story: "Кони заблокировали друг друга в многопоточном приложении (Deadlock). Поток А держит Мутекс 1 и ждет Мутекс 2. Поток Б держит Мутекс 2 и ждет Мутекс 1. Какое архитектурное решение решает эту проблему?\n\nВарианты: 1) Увеличение памяти, 2) Иерархия захвата ресурсов (Resource Ordering), 3) sleep(100)" },
            { id: 9, name: "Пояс Ипполиты", hero: "👑", desc: "Дешифровка символов ASCII после XOR-модификации.", answer: "L", story: "Пояс зашифрован модифицированным алгоритмом. Каждому символу строки сопоставляется его ASCII-код, к которому применяется операция XOR с маской 0x0F. Дешифруйте символ, если на входе получилось число 75." },
            { id: 10, name: "Коровы Гериона", hero: "🧌", desc: "Поиск кратчайшего пути по связанному плотному графу.", answer: "7", story: "Вычислите длину кратчайшего пути от вершины А до вершины Е на ненаправленном графе коров Гериона:\n\nA -> B (вес 2), A -> C (вес 5), B -> C (вес 2), B -> D (вес 4), C -> E (вес 3), D -> E (вес 1)." },
            { id: 11, name: "Яблоки Гесперид", hero: "🍏", desc: "Обход уровней дерева в ширину через очередь FIFO.", answer: "BFS", story: "Напишите название стандартного метода обхода графа (аббревиатуру из 3 букв на английском), который использует ОЧЕРЕДЬ (FIFO) и обходит структуру строго по уровням (в ширину)." },
            { id: 12, name: "Цербер", hero: "🐕", desc: "Внедрение вредоносного SQL-кода в обход ядра авторизации.", answer: "sql injection", story: "Вы наткнулись на суперядро Цербера. Защита требует указать тип атаки, при которой злоумышленник внедряет вредоносный SQL-код в поле ввода, заставляя сервер выдать токен администратора. Напишите название уязвимости (два слова на английском)." }
        ];

        // Загрузка сохранённого прогресса для текущей команды
        function loadProgress() {
            const savedUser = localStorage.getItem('currentUser');
            if (!savedUser) return { completed: {}, failed: {} };
            
            const userData = JSON.parse(savedUser);
            const saved = localStorage.getItem(`otbor_progress_${userData.teamName}`);
            if (saved) {
                return JSON.parse(saved);
            }
            return { completed: {}, failed: {} };
        }

        // Сохранение прогресса
        function saveProgress(progress) {
            const savedUser = localStorage.getItem('currentUser');
            if (!savedUser) return;
            const userData = JSON.parse(savedUser);
            localStorage.setItem(`otbor_progress_${userData.teamName}`, JSON.stringify(progress));
        }

        let progress = loadProgress();
        let currentLaborId = null;
        
        const modal = document.getElementById('laborModal');
        const authOverlay = document.getElementById('authOverlay');
        const laborsGrid = document.getElementById('laborsGrid');

        // Генерация карточек
        function renderCards() {
            laborsGrid.innerHTML = '';
            laborsData.forEach(labor => {
                const card = document.createElement('div');
                card.className = 'labor-card';
                
                // Определяем статус карточки
                if (progress.completed[labor.id]) {
                    card.classList.add('completed');
                } else if (progress.failed[labor.id]) {
                    card.classList.add('failed');
                } else {
                    card.classList.add('active');
                }
                
                card.innerHTML = `
                    <div class="labor-status">${progress.completed[labor.id] ? 'ПРОЙДЕНО' : (progress.failed[labor.id] ? 'ПРОВАЛ' : 'КВЕСТ')}</div>
                    <div class="labor-hero">${labor.hero}</div>
                    <div class="labor-number">${labor.id < 10 ? '0' + labor.id : labor.id}</div>
                    <h3 class="labor-name">${labor.name}</h3>
                    <p class="labor-description">${labor.desc}</p>
                `;
                
                // Если карточка не пройдена и не провалена — можно кликать
                if (!progress.completed[labor.id] && !progress.failed[labor.id]) {
                    card.onclick = () => openLabor(labor.id);
                } else {
                    card.onclick = null;
                }
                
                laborsGrid.appendChild(card);
            });
        }

        // Логика авторизации
        document.getElementById('authSubmitBtn').addEventListener('click', function() {
            const team = document.getElementById('authTeamName').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            const registered = localStorage.getItem('registeredUser');

            if (!registered) {
                document.getElementById('authError').innerText = "Команда не найдена в системе!";
                return;
            }

            const userData = JSON.parse(registered);
            if (userData.teamName === team && userData.password === pass) {
                authOverlay.style.display = 'none';
                localStorage.setItem('currentUser', JSON.stringify(userData));
                // Перезагружаем прогресс для новой команды
                progress = loadProgress();
                renderCards();
            } else {
                document.getElementById('authError').innerText = "Неверное имя или пароль!";
            }
        });

        // Проверка при загрузке
        if (localStorage.getItem('currentUser')) {
            authOverlay.style.display = 'none';
            progress = loadProgress();
        }

        function openLabor(id) {
            // Проверяем, не пройдено ли уже задание и не провалено ли
            if (progress.completed[id] || progress.failed[id]) {
                return;
            }
            
            currentLaborId = id;
            const labor = laborsData.find(l => l.id === id);
            
            document.getElementById('modalNumber').innerText = id < 10 ? '0' + id : id;
            document.getElementById('modalTitle').innerText = labor.name;
            document.getElementById('modalStory').innerText = labor.story;
            document.getElementById('answerInput').value = "";
            document.getElementById('feedbackMsg').innerText = "";
            document.getElementById('feedbackMsg').className = "feedback-msg";
            modal.classList.add('visible');
        }

        function closeModal() { 
            modal.classList.remove('visible');
            currentLaborId = null;
        }

        function submitAnswer() {
            if (!currentLaborId) return;
            
            const ans = document.getElementById('answerInput').value.trim();
            const labor = laborsData.find(l => l.id === currentLaborId);
            const isCorrect = ans.toLowerCase() === labor.answer.toLowerCase();
            
            if (isCorrect) {
                document.getElementById('feedbackMsg').innerText = "⚡ КОД ВЕРЕН! ПОДВИГ ЗАСЧИТАН ⚡";
                document.getElementById('feedbackMsg').className = "feedback-msg success";
                
                progress.completed[currentLaborId] = true;
                delete progress.failed[currentLaborId];
                saveProgress(progress);
                renderCards();
                
                setTimeout(closeModal, 1000);
            } else {
                document.getElementById('feedbackMsg').innerText = "❌ ОШИБКА! ПОДВИГ ПРОВАЛЕН. ДОСТУП ЗАКРЫТ ❌";
                document.getElementById('feedbackMsg').className = "feedback-msg error";
                
                progress.failed[currentLaborId] = true;
                delete progress.completed[currentLaborId];
                saveProgress(progress);
                renderCards();
                
                setTimeout(closeModal, 1500);
            }
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('answerSubmitBtn').addEventListener('click', submitAnswer);
        modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
        
        renderCards();
    </script>
</body>
</html>
