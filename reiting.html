<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Рейтинг - Геракл</title>
    <link rel="stylesheet" href="reiting.css">
</head>
<body>

    <header class="cyber-header">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">ГЕРАКЛ</span>
                <span class="logo-glow"></span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="reg.html" class="nav-link">Регистрация</a>
                <a href="urovni.html" class="nav-link">Этапы</a>
                <a href="profil.html" class="nav-link">Профиль</a>
                <a href="reiting.html" class="nav-link active">Рейтинг</a>
                <a href="podskazka.html" class="nav-link">Подсказка</a>
            </div>
        </div>
        <div class="neon-line"></div>
    </header>

    <footer class="cyber-footer">
        <div class="footer-content">
            <div class="footer-line"></div>
            <span class="footer-text">⚡ ВЫПОЛНЕНО КОМАНДОЙ 6 ⚡</span>
            <div class="footer-line"></div>
        </div>
        <div class="footer-neon"></div>
    </footer>

    <div class="layer-container">
        <img class="bg-full" src="kartinki/fon.jpg" alt="Фоновое изображение">
        
        <div class="cyber-grid"></div>
        <div class="particles" id="particles"></div>
        <div class="twinkling-stars" id="twinklingStars"></div>
        <div class="holo-circle"></div>
        <div class="running-lights">
            <div class="running-light top"></div>
            <div class="running-light bottom"></div>
            <div class="running-light left"></div>
            <div class="running-light right"></div>
        </div>
        <div class="neon-corner corner-tl"></div>
        <div class="neon-corner corner-tr"></div>
        <div class="neon-corner corner-bl"></div>
        <div class="neon-corner corner-br"></div>

        <div class="layer-1-wrapper">
            <img class="layer-1-img" src="kartinki/fon_3_1.png" alt="Первый слой с отступами">
        </div>

        <div class="layer-2-wrapper">
            <img class="layer-2-img" src="kartinki/fon_3_2.png" alt="Второй слой с отступами">
            <img class="toshka-1" src="kartinki/toshka.png" alt="Тошка 1">
            <img class="toshka-2" src="kartinki/toshka.png" alt="Тошка 2">
        </div>

        <a href="urovni.html">
            <button class="home-btn">
                <span>К ЭТАПАМ</span>
            </button>
        </a>
        
        <div class="foreground">
            <div class="rating-container">
                <div class="rating-title-wrapper">
                    <h1 class="rating-title glitch-title" data-text="ТАБЛИЦА ЛИДЕРОВ">ТАБЛИЦА ЛИДЕРОВ</h1>
                </div>
                <div class="rating-subtitle">ТОП-10 КОМАНД ПО ИТОГАМ ИСПЫТАНИЙ</div>
                
                <div class="rating-table">
                    <div class="rating-header">
                        <div class="col-place">МЕСТО</div>
                        <div class="col-name">КОМАНДА</div>
                        <div class="col-score">ОЧКИ</div>
                    </div>
                    <div id="leaderboardBody"></div>
                </div>

                <div class="rating-footer">
                    <div class="update-date" id="updateDate">🏆 ЗАГРУЗКА...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_URL}/auth/leaderboard`);
                const data = await response.json();

                const container = document.getElementById('leaderboardBody');
                container.innerHTML = '';

                if (data.leaders && data.leaders.length > 0) {
                    data.leaders.forEach((user, index) => {
                        const row = document.createElement('div');
                        const place = index + 1;
                        let placeClass = '';
                        if (place === 1) placeClass = 'first';
                        else if (place === 2) placeClass = 'second';
                        else if (place === 3) placeClass = 'third';
                        
                        row.className = `rating-row ${placeClass}`;
                        row.innerHTML = `
                            <div class="col-place">${place === 1 ? '🏆 ' : ''}${place}</div>
                            <div class="col-name">${user.team_name}</div>
                            <div class="col-score">${user.points || 0}</div>
                        `;
                        container.appendChild(row);
                    });

                    document.getElementById('updateDate').textContent = `🏆 ОБНОВЛЕНО: ${new Date().toLocaleDateString('ru-RU')} 🏆`;
                } else {
                    container.innerHTML = `
                        <div class="rating-row" style="text-align:center;color:#a0aaff;">
                            <div class="col-place" style="width:100%;">Пока нет зарегистрированных команд</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Ошибка загрузки таблицы лидеров:', error);
                document.getElementById('leaderboardBody').innerHTML = `
                    <div class="rating-row" style="text-align:center;color:#ff4757;">
                        <div class="col-place" style="width:100%;">Ошибка загрузки данных</div>
                    </div>
                `;
            }
        }

        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = 5 + Math.random() * 5 + 's';
                particle.style.width = (Math.random() * 3 + 1) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        function createStars() {
            const container = document.getElementById('twinklingStars');
            if (!container) return;
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = 2 + Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        const glitchElements = document.querySelectorAll('.glitch-title');
        glitchElements.forEach(el => {
            setInterval(() => {
                el.style.transform = `skew(${Math.random() * 2 - 1}deg, ${Math.random() * 2 - 1}deg)`;
                setTimeout(() => {
                    el.style.transform = 'skew(0deg, 0deg)';
                }, 100);
            }, 3000);
        });

        createParticles();
        createStars();
        loadLeaderboard();
    </script>
</body>
</html>
